<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>اختبار المناولة الأولى — First Communion Quiz</title>
<style>
  :root {
    --p:#1A6FA8;--ps:#2E86C1;--pl:#D6EAF8;--a:#1558A0;
    --g:#1E8449;--r:#C0392B;--bg:#F0F8FF;--card:#fff;
    --tx:#1a1a2e;--txl:#555;--brd:#A9CCE3;--rad:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:40px}
  .hdr{background:linear-gradient(135deg,#1558A0,#2E86C1,#5DADE2);color:#fff;padding:18px 20px 22px;text-align:center}
  .hdr h1{font-size:22px;font-weight:800;margin-bottom:4px;text-shadow:0 1px 3px rgba(0,0,0,.2)}
  .hdr p{font-size:14px;opacity:.9}
  .scr{display:none;padding:20px;max-width:600px;margin:0 auto}
  .scr.active{display:block}
  .card{background:var(--card);border-radius:var(--rad);padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(26,111,168,.1);border:1px solid var(--brd)}
  /* LANGUAGE PICKER */
  .lang-pick{display:flex;gap:14px;margin-top:16px}
  .lang-btn{flex:1;padding:20px 10px;border:3px solid var(--brd);border-radius:16px;background:var(--card);font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;transition:.15s;color:var(--tx);text-align:center}
  .lang-btn:hover{border-color:var(--p);background:#EBF5FB}
  .lang-btn .flag{font-size:36px;display:block;margin-bottom:6px}
  /* NAME SCREEN */
  .welcome-icon{font-size:60px;text-align:center;margin:20px 0 10px}
  .welcome-title{font-size:22px;font-weight:800;text-align:center;color:var(--p);margin-bottom:8px}
  .welcome-sub{font-size:15px;color:var(--txl);text-align:center;margin-bottom:24px;line-height:1.6}
  label{display:block;font-size:15px;font-weight:700;color:var(--p);margin-bottom:8px}
  input[type=text]{width:100%;padding:14px 16px;border:2px solid var(--brd);border-radius:12px;font-size:17px;font-family:inherit;color:var(--tx);background:#f5f9ff;transition:.2s}
  input[type=text]:focus{outline:none;border-color:var(--p);background:#fff}
  .btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;transition:.15s;margin-top:12px}
  .btn-primary{background:linear-gradient(135deg,#1558A0,#2E86C1);color:#fff}
  .btn-primary:active{transform:scale(.97)}
  .btn-primary:disabled{opacity:.45;cursor:default}
  /* QUIZ */
  .q-progress-bar{background:#D6EAF8;border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden}
  .q-progress-fill{background:linear-gradient(90deg,#1558A0,#5DADE2);height:100%;border-radius:20px;transition:.4s}
  .q-counter{font-size:13px;color:var(--txl);text-align:center;margin-bottom:16px}
  .q-card{background:var(--card);border-radius:var(--rad);padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(26,111,168,.12);border:2px solid var(--brd)}
  .q-emoji{font-size:32px;text-align:center;margin-bottom:10px}
  .q-text{font-size:18px;font-weight:700;color:var(--tx);text-align:center;margin-bottom:18px;line-height:1.5}
  .opt{display:block;width:100%;padding:14px 16px;margin-bottom:10px;border:2px solid var(--brd);border-radius:12px;background:#f5f9ff;font-size:16px;font-family:inherit;color:var(--tx);cursor:pointer;transition:.15s;line-height:1.4}
  .opt:active{transform:scale(.98)}
  .opt.selected{border-color:var(--p);background:#D6EAF8;font-weight:700}
  .opt.correct{border-color:var(--g);background:#d5f5e3;color:var(--g);font-weight:700}
  .opt.wrong{border-color:var(--r);background:#fadbd8;color:var(--r)}
  .q-feedback{background:#EBF5FB;border:1px solid var(--ps);border-radius:12px;padding:12px 14px;font-size:15px;color:#1A5276;line-height:1.6;margin-top:4px;display:none}
  .q-feedback.show{display:block}
  .nav-btns{display:flex;gap:10px;margin-top:4px}
  .btn-next{flex:1;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#1558A0,#2E86C1);color:#fff;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;transition:.15s}
  .btn-next:disabled{opacity:.35;cursor:default}
  .loading{text-align:center;padding:40px;color:var(--txl);font-size:16px}
  .spinner{width:36px;height:36px;border:4px solid var(--brd);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .result-icon{font-size:70px;text-align:center;margin:10px 0}
  .result-score{font-size:48px;font-weight:900;text-align:center;color:var(--p);margin:8px 0}
  .result-label{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px}
  .pass-badge{background:linear-gradient(135deg,#1E8449,#27AE60);color:#fff;border-radius:12px;padding:12px 20px;text-align:center;font-size:20px;font-weight:800;margin-bottom:16px}
  .fail-badge{background:linear-gradient(135deg,#C0392B,#E74C3C);color:#fff;border-radius:12px;padding:12px 20px;text-align:center;font-size:20px;font-weight:800;margin-bottom:16px}
  .wrong-item{background:#fadbd8;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:14px;color:#922B21;line-height:1.5}
  .wrong-item strong{display:block;margin-bottom:3px;font-size:15px}
</style>
</head>
<body>

<div class="hdr">
  <h1>🍞 اختبار المناولة الأولى — First Communion Quiz</h1>
  <p>سرّ الإفخارستيا المقدسة — The Holy Eucharist — ٢٠٢٦</p>
</div>

<!-- SCREEN 0: LANGUAGE PICKER -->
<div class="scr active" id="scr-lang">
  <div class="welcome-icon">🌐</div>
  <div class="welcome-title" style="margin-bottom:6px">اختر لغة الاختبار</div>
  <div class="welcome-title" style="font-size:17px;color:var(--txl);font-weight:500;margin-bottom:20px">Choose your quiz language</div>
  <div class="lang-pick">
    <button class="lang-btn" id="btn-lang-ar"><span class="flag">🇱🇧</span>عربي</button>
    <button class="lang-btn" id="btn-lang-en"><span class="flag">🇬🇧</span>English</button>
  </div>
</div>

<!-- SCREEN 1: NAME -->
<div class="scr" id="scr-name">
  <div class="welcome-icon">✝️</div>
  <div class="welcome-title" id="wt"></div>
  <div class="welcome-sub" id="ws"></div>
  <div class="card">
    <label for="student-name" id="lbl-name"></label>
    <input type="text" id="student-name" autocomplete="off">
    <button class="btn btn-primary" id="btn-start" disabled></button>
  </div>
</div>

<!-- SCREEN 2: QUIZ -->
<div class="scr" id="scr-quiz">
  <div class="q-progress-bar"><div class="q-progress-fill" id="qpf" style="width:0%"></div></div>
  <div class="q-counter" id="qctr"></div>
  <div id="q-area"></div>
  <div class="nav-btns">
    <button class="btn-next" id="btn-next" disabled></button>
  </div>
</div>

<!-- SCREEN 3: SUBMITTING -->
<div class="scr" id="scr-submit">
  <div class="loading">
    <div class="spinner"></div>
    <p id="saving-txt"></p>
  </div>
</div>

<!-- SCREEN 4: RESULT -->
<div class="scr" id="scr-result">
  <div class="result-icon" id="res-icon"></div>
  <div class="result-score" id="res-score"></div>
  <div class="result-label" id="res-label"></div>
  <div id="res-badge"></div>
  <div class="card" id="res-wrong-card" style="display:none">
    <h3 id="wrong-hdr" style="font-size:16px;color:var(--r);margin-bottom:10px"></h3>
    <div id="res-wrong-list"></div>
  </div>
  <div class="card" style="text-align:center;background:#d5f5e3;border-color:#1e8449">
    <p id="saved-txt" style="font-size:15px;color:var(--g);line-height:1.6"></p>
  </div>
</div>

const TOTAL = 15;

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let LANG = 'ar';
let studentName = '';
let curQ = 0;
let answers = new Array(TOTAL).fill(null);
let answered = new Array(TOTAL).fill(false);
let SHUFFLED = [];

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function $(id){ return document.getElementById(id); }
function SHW(id){ document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); window.scrollTo(0,0); }
function AR(n){ return String(n).replace(/\d/g, d=>'٠١٢٣٤٥٦٧٨٩'[d]); }

function SHUFFLE(arr){
  const a = [...arr];
  for(let i = a.length-1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function SET_LANG(lang){
  LANG = lang;
  const t = T[lang];
  document.documentElement.setAttribute('lang', t.lang);
  document.documentElement.setAttribute('dir', t.dir);
  document.getElementById('student-name').style.textAlign = t.optAlign;
  $('wt').textContent = t.welcomeTitle;
  $('ws').innerHTML = t.welcomeSub;
  $('lbl-name').textContent = t.labelName;
  $('student-name').placeholder = t.placeholder;
  $('btn-start').textContent = t.btnStart;
  $('saving-txt').textContent = t.saving;
}

function PREPARE_QUESTIONS(){
  const shuffledQs = SHUFFLE(QS);
  SHUFFLED = shuffledQs.map(q => {
    const src = LANG === 'en' ? { ...q, q: q.en.q, o: q.en.o, fb: q.en.fb } : q;
    const indices = SHUFFLE([0,1,2,3]);
    const newOptions = indices.map(i => src.o[i]);
    const newCorrect = indices.indexOf(q.a);
    return { ...src, o: newOptions, a: newCorrect };
  });
}

function CHK(){
  $('btn-start').disabled = $('student-name').value.trim().length < 2;
}

function START(){
  studentName = $('student-name').value.trim();
  curQ = 0;
  answers = new Array(TOTAL).fill(null);
  answered = new Array(TOTAL).fill(false);
  PREPARE_QUESTIONS();
  SHW('scr-quiz');
  RenderQ();
}

function RenderQ(){
  const t = T[LANG];
  const q = SHUFFLED[curQ];
  const pct = (curQ / TOTAL) * 100;
  $('qpf').style.width = pct + '%';
  $('qctr').textContent = t.counter(curQ + 1, TOTAL);

  let html = `<div class="q-card">
    <div class="q-emoji">${q.e}</div>
    <div class="q-text">${q.q}</div>`;

  q.o.forEach((opt, i) => {
    let cls = 'opt';
    if(answered[curQ]){
      if(i === q.a) cls += ' correct';
      else if(i === answers[curQ] && answers[curQ] !== q.a) cls += ' wrong';
    } else if(answers[curQ] === i){
      cls += ' selected';
    }
    html += `<button class="${cls}" data-idx="${i}" style="text-align:${t.optAlign}">${opt}</button>`;
  });

  html += `<div class="q-feedback ${answered[curQ]?'show':''}">${q.fb}</div></div>`;
  $('q-area').innerHTML = html;

  const isLast = curQ === TOTAL - 1;
  $('btn-next').textContent = isLast ? t.btnFinish : t.btnNext;
  $('btn-next').disabled = answers[curQ] === null;
}

function SEL(i){
  if(answered[curQ]) return;
  answers[curQ] = i;
  answered[curQ] = true;
  $('btn-next').disabled = false;
  RenderQ();
}

function NEXT(){
  if(curQ < TOTAL - 1){ curQ++; RenderQ(); window.scrollTo(0,0); }
  else { SUBMIT(); }
}

function SUBMIT(){
  SHW('scr-submit');
  const correct = answers.filter((a,i) => a === SHUFFLED[i].a).length;
  const pct = Math.round((correct / TOTAL) * 100);
  const pass = pct >= 60;

  const wrongQs = [];
  answers.forEach((a,i) => {
    if(a !== SHUFFLED[i].a){
      wrongQs.push({ num:i+1, q:SHUFFLED[i].q, chosen:SHUFFLED[i].o[a], correct:SHUFFLED[i].o[SHUFFLED[i].a] });
    }
  });

  const payload = {
    name: studentName,
    lang: LANG,
    score: correct,
    total: TOTAL,
    pct: pct,
    pass: pass,
    timestamp: new Date().toISOString(),
    answers: answers,
    wrongCount: wrongQs.length,
    wrongQuestions: wrongQs.map(w=>({num:w.num, q:w.q, chosen:w.chosen, correct:w.correct}))
  };

  function saveAndShow(){
    if(window._FB_READY && window._db){
      try {
        const dbRef = window._ref(window._db, 'communion_results');
        const newRef = window._push(dbRef);
        window._set(newRef, payload).then(()=>{
          ShowResult(correct, pct, pass, wrongQs);
        }).catch(()=>{ ShowResult(correct, pct, pass, wrongQs); });
      } catch(e){ ShowResult(correct, pct, pass, wrongQs); }
    } else {
      setTimeout(()=>ShowResult(correct, pct, pass, wrongQs), 800);
    }
  }

  if(window._FB_READY){ saveAndShow(); }
  else { setTimeout(saveAndShow, 1500); }
}

function ShowResult(correct, pct, pass, wrongQs){
  const t = T[LANG];
  SHW('scr-result');
  $('res-icon').textContent = pass ? '🎉' : '📖';
  $('res-score').textContent = correct + ' / ' + TOTAL;
  $('res-label').textContent = t.resultLabel(pct);
  $('res-badge').innerHTML = pass
    ? `<div class="pass-badge">${t.pass}</div>`
    : `<div class="fail-badge">${t.fail}</div>`;
  $('wrong-hdr').textContent = t.wrongHdr;
  $('saved-txt').textContent = t.saved;

  if(wrongQs.length > 0){
    $('res-wrong-card').style.display = 'block';
    $('res-wrong-list').innerHTML = wrongQs.map(w =>
      `<div class="wrong-item">
        <strong>${t.qPrefix}${w.num}: ${w.q}</strong>
        ${t.yourAns}: ${w.chosen}<br>
        ${t.correct}: <span style="color:#1E8449;font-weight:700">${w.correct}</span>
      </div>`
    ).join('');
  }
}

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('btn-lang-ar').addEventListener('click', function(){
    SET_LANG('ar');
    SHW('scr-name');
  });
  document.getElementById('btn-lang-en').addEventListener('click', function(){
    SET_LANG('en');
    SHW('scr-name');
  });
  document.getElementById('student-name').addEventListener('input', CHK);
  document.getElementById('btn-start').addEventListener('click', START);
  document.getElementById('btn-next').addEventListener('click', NEXT);
  document.getElementById('q-area').addEventListener('click', function(e){
    const btn = e.target.closest('button.opt');
    if(btn) SEL(parseInt(btn.dataset.idx));
  });
});
</script>
